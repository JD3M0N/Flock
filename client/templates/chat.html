{% extends "base.html" %}
{% block title %}Flock | Chat{% endblock %}
{% block content %}
<a href="/chats" class="back-link">Volver a chats</a>

<section class="panel panel-strong chat-shell">
    <header class="chat-header">
        <div>
            <div class="page-kicker">Chat privado</div>
            <h2 class="section-title">@{{ contact }}</h2>
            <p class="muted">Entrega directa P2P.</p>
        </div>
        <div class="status-pills">
            <div class="pill pill-strong">E2E</div>
            <a class="pill" href="/diagnostics">Defensa</a>
        </div>
    </header>

    <div class="messages-area" id="messages"></div>

    <form class="composer" id="composer">
        <textarea class="textarea" id="msgInput" placeholder="Escribe tu mensaje..." autocomplete="off"></textarea>
        <button class="btn btn-primary" type="submit" id="sendBtn">Enviar</button>
    </form>
</section>

<div id="feedback" class="status hidden"></div>
{% endblock %}

{% block scripts %}
<script>
    const socket = io();
    const username = "{{ username }}";
    const contact = "{{ contact }}";
    const messagesDiv = document.getElementById('messages');
    const input = document.getElementById('msgInput');
    const sendBtn = document.getElementById('sendBtn');

    socket.on('request_error', ({error}) => showFeedback(error, true));
    socket.on('auth_required', ({redirect}) => { window.location.href = redirect || '/register'; });

    socket.on('chat_history', function(messages) {
        messagesDiv.innerHTML = '';
        if (messages.length === 0) {
            const empty = document.createElement('div');
            empty.className = 'status';
            empty.textContent = 'Aun no hay mensajes con este contacto.';
            messagesDiv.appendChild(empty);
            return;
        }
        messages.forEach(function(message) {
            addMessage(message.author, message.text, message.date);
        });
        scrollToBottom();
    });

    socket.on('new_message', function(data) {
        if (data.sender !== contact) return;
        removeEmptyState();
        addMessage(data.sender, data.text, '');
        scrollToBottom();
        socket.emit('mark_seen', withCsrf({contact}));
    });

    socket.on('message_sent', function(data) {
        if (data.contact !== contact) return;
        removeEmptyState();
        addMessage(username, data.text, '', data.queued ? 'Pendiente local' : 'Enviado');
        input.value = '';
        input.style.height = '48px';
        sendBtn.disabled = false;
        if (data.queued) {
            showFeedback('Contacto no disponible. Mensaje guardado en cola local.');
        } else {
            showFeedback('');
        }
        scrollToBottom();
    });

    document.getElementById('composer').addEventListener('submit', function(event) {
        event.preventDefault();
        const text = input.value.trim();
        if (!text) return;
        sendBtn.disabled = true;
        socket.emit('send_message', withCsrf({contact, text}));
    });

    input.addEventListener('input', function() {
        input.style.height = '48px';
        input.style.height = Math.min(input.scrollHeight, 180) + 'px';
    });

    function addMessage(author, text, date, state = '') {
        const div = document.createElement('div');
        div.className = 'message ' + (author === username ? 'message-own' : 'message-other');
        div.innerHTML =
            '<div>' + escapeHtml(text) + '</div>' +
            (date || state ? '<div class="message-date">' + escapeHtml([date, state].filter(Boolean).join(' - ')) + '</div>' : '');
        messagesDiv.appendChild(div);
    }

    function removeEmptyState() {
        messagesDiv.querySelectorAll('.status').forEach(function(node) { node.remove(); });
    }

    function scrollToBottom() {
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    function showFeedback(message, isError = false) {
        const feedback = document.getElementById('feedback');
        sendBtn.disabled = false;
        if (!message) {
            feedback.className = 'status hidden';
            feedback.textContent = '';
            return;
        }
        feedback.className = 'status' + (isError ? ' status-error' : '');
        feedback.textContent = message;
    }

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    socket.emit('load_chat_history', withCsrf({contact}));
    socket.emit('mark_seen', withCsrf({contact}));
</script>
{% endblock %}
